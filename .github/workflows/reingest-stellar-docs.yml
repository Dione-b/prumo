name: Re-ingest Stellar Docs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  reingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: dummy-api-key
        run: uv run alembic upgrade head

      - name: Start API server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: dummy-api-key
          STELLAR_PROJECT_ID: ${{ secrets.STELLAR_PROJECT_ID }}
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat uvicorn.log
          exit 1

      - name: Run ingestion script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_KEY: dummy-api-key
          STELLAR_PROJECT_ID: ${{ secrets.STELLAR_PROJECT_ID }}
          PRUMO_API_BASE_URL: http://127.0.0.1:8000
        run: uv run python scripts/ingest_stellar_docs.py
